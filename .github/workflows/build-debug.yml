name: Build Debug

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-debug-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.5
          channel: stable
          cache: true

      # flutter create . создаёт недостающие platform-папки (android/ios/etc.)
      # и попутно резолвит зависимости — без этого dart format падает,
      # т.к. package:flutter_lints ещё не подтянут.
      - name: Regenerate platform files & resolve deps
        run: flutter create .

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tai-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14