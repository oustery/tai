name: Debug

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Отменять предыдущий запуск для той же ветки/PR — нет смысла
# собирать устаревший коммит, если уже пушнули новый.
concurrency:
  group: debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Быстые проверки (не нужны зависимости) ──────────────

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      # ── Зависимости + платформенные файлы ───────────────────

      - name: Generate platform files & resolve deps
        run: flutter create . --platforms=android

      # ── Проверки, требующие зависимости ─────────────────────

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # ── Сборка (только если всё выше прошло) ───────────────

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14