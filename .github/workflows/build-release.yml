name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Релизы НЕ отменять — каждый тег важен.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Lint → Test → Build → Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Полная история нужна для generate_release_notes
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Быстые проверки (не нужны зависимости) ──────────────

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      # ── Зависимости + платформенные файлы ───────────────────

      - name: Generate platform files & resolve deps
        run: flutter create . --platforms=android

      # ── Проверки, требующие зависимости ─────────────────────

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # ── Сборка ─────────────────────────────────────────────

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release App Bundle
        run: flutter build appbundle --release

      # ── Публикация ─────────────────────────────────────────

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab